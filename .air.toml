root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  entrypoint = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
  exclude_dir = ["tmp", "vendor", ".git", "docs/swagger"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = 500
  pre_cmd = ["go mod tidy", "swag init -g cmd/server/main.go --output docs/swagger"]

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
