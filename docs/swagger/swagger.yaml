  /audit/transaction-history:
    get:
      description: Get transition delete history with optional filters
      parameters:
      - description: Transaction Type
        in: query
        name: transaction_type
        type: string
      - description: Deleted By User ID
        in: query
        name: deleted_by
        type: integer
      - description: From Date (YYYY-MM-DD)
        in: query
        name: from_date
        type: string
      - description: To Date (YYYY-MM-DD)
        in: query
        name: to_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: List transaction delete history
      tags:
      - Transaction History
    post:
      consumes:
      - application/json
      description: Create a new record of a deleted transaction
      parameters:
      - description: Create history request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/transaction_history.CreateDeleteHistoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/response.APIResponse'
      security:
      - BearerAuth: []
      summary: Create transaction delete history
      tags:
      - Transaction History
